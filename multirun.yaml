  - 745
  - 2056
  - 88
  - 1390
  - 5571
model_params:
  hidden_dim: 168
  critic_type: mlp
env:
  name: multi_box_push
  n_envs: ${envs_per_job:${n_jobs}}
  n_agents: 9
  n_objects: 3
  reward_mode: dense
hyperedges:
  proximity:
  - proximity
  contact:
  - contact
  mix:
  - proximity
  - contact
device: cpu
trial_id: debug
view: false
checkpoint: false
evaluate: false
n_jobs: 4
