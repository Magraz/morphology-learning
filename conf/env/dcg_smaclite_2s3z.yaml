# @package _global_
# SMAClite 2s3z for DCG. The DCG trainer reads `environment` (env type),
# `n_agents`, and `env_variant` (map_name) from this block; `n_envs` autoscales
# centrally in conf/config.yaml (pin with env.n_envs=<N> on the CLI).
env:
  environment: smaclite
  n_agents: 5
  env_variant: "2s3z"
