# @package _global_
# See macro_mjx_16a_4o.yaml: one step is one macro DECISION, so the mappo_jax
# default of 1024 spans ~20 episodes per stream (horizon is 52). Held identical
# across every macro arm so the arms stay comparable.
params:
  n_steps: 256
  # 1e8 / macro_len: equalizes the low-level physics budget with mjx_16a_4o (see
  # macro_mjx_16a_4o.yaml). Rescale if macro_len changes.
  n_total_steps: 5000000.0
env:
  # Difference-rewards arm of the hierarchical macro env: same SyncMacroMJX skill
  # selection as macro_mjx_9a_3o, but the per-macro-window reward is the sum of
  # the base env's exact single-step difference rewards D_i = G - G_-i over the
  # macro_len steps. mappo_jax reads reward_mode="difference_rewards" and switches
  # to a per-agent critic head + per-agent GAE (MAPPOConfig.per_agent_rewards).
  # info["task_reward"] still carries the team scalar, so logging/eval report team
  # performance and stay comparable to the dense arm.
  environment: macro_mjx
  # BATCH DIMENSION, not a hardware knob: MJX envs are vmapped on one device, so
  # this is the width of the batched simulation. It sets the per-update batch
  # (params.n_steps * n_envs) and therefore num_updates, so it is a
  # HYPERPARAMETER — keep it identical across arms you intend to compare, and
  # never derive it from the core count. Lower it only if the GPU OOMs (the
  # _wdr/_aligned arms fork n_envs * n_agents concurrent sims); if you do, lower
  # it for every arm in the comparison.
  n_envs: 32
  n_agents: 16
  n_objects: 4
  macro_len: 20
  reward_mode: difference_rewards
