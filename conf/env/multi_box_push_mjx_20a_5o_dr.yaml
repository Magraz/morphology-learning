# @package _global_
env:
  environment: multi_box_push_mjx
  # n_envs is set centrally in conf/config.yaml (usable_cores // n_jobs). That
  # default targets subprocess box2d envs; MJX envs are vmapped on one device,
  # so the count is not core-bound — pin it on the CLI (e.g. env.n_envs=32).
  # The per-update batch scales with it: params.n_steps * n_envs env-steps.
  n_agents: 20
  n_objects: 5
  # Per-agent single-step difference rewards D_i = G - G_-i, computed exactly by
  # forking the pure MJX state once per agent (see MultiBoxPushMJX._difference_rewards).
  # Switches mappo_jax to a per-agent critic head + per-agent GAE.
  reward_mode: difference_rewards
