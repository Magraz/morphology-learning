# @package _global_
env:
  # Hierarchical macro-action layer over multi_box_push_mjx: the policy selects
  # among the 4 scripted skills (discrete) and each choice runs macro_len
  # low-level physics steps (SyncMacroMJX, one transition per decision). Trained
  # by mappo_jax exactly like the base env; the actor just has a categorical head.
  environment: macro_mjx
  # BATCH DIMENSION, not a hardware knob: MJX envs are vmapped on one device, so
  # this is the width of the batched simulation. It sets the per-update batch
  # (params.n_steps * n_envs) and therefore num_updates, so it is a
  # HYPERPARAMETER — keep it identical across arms you intend to compare, and
  # never derive it from the core count. Lower it only if the GPU OOMs (the
  # _wdr/_aligned arms fork n_envs * n_agents concurrent sims); if you do, lower
  # it for every arm in the comparison.
  n_envs: 32
  n_agents: 16
  n_objects: 4
  # Low-level physics steps per macro decision. base.max_steps (1024) / macro_len
  # decisions per episode; the macro horizon is ceil(1024 / macro_len).
  macro_len: 20
  # Team reward, accumulated over each macro window. difference_rewards is also
  # valid (summed per-agent D over the window) but is a separate experiment.
  reward_mode: dense
