# @package _global_
# DCG over macro-actions. Same off-policy episodic Q-learning core as `dcg`
# (algorithms/dcg/), but paired with an HRL-wrapped env (conf/env/dcg_macro_*)
# so the discrete action selects one of 4 frozen skills run for `macro_len`
# low-level steps. The model group (conf/model/dcg_macro.yaml) supplies
# model_params; the env group publishes environment/base_environment/macro_len.
algorithm: dcg_macro
params:
  n_total_steps: 2000000
  buffer_size: 2048
  batch_size: 32
  lr: 0.0005
  optim_alpha: 0.99
  optim_eps: 0.00001
  gamma: 0.99
  grad_norm_clip: 10.0
  double_q: true
  target_update_interval: 200
  epsilon_start: 1.0
  epsilon_finish: 0.05
  epsilon_anneal_time: 250000
  # macro-steps per episode: base env truncates at 1024 low-level steps and
  # macro_len=10 => ~103 macro-steps, so 110 covers a full episode with headroom.
  episode_limit: 110
  test_interval: 20000
  test_nepisode: 20
  save_model_interval: 200000
  log_interval: 5000
  learner_log_interval: 10000
