[project]
name = "morphology-learning"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "dhg>=0.9.5",
    "dill>=0.4.1",
    "gymnasium[box2d]>=1.2.3",
    "imageio>=2.37.3",
    "imageio-ffmpeg>=0.6.0",
    "matplotlib>=3.10.8",
    "notebook>=7.5.3",
    "pandas>=2.3.3",
    "scikit-learn>=1.3.0",
    "smaclite",
    "torch>=1.13.1",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.uv.workspace]
members = [
    "smaclite",
]

[tool.uv.sources]
smaclite = { workspace = true }
